# ===================================
# IndianStars API - Configuration
# ===================================

# Server Port
server.port=8080

# ===================================
# PostgreSQL Database Config
# FREE Options:
#   1. Neon.tech    - https://neon.tech (Free tier)
#   2. Supabase     - https://supabase.com (Free tier)
#   3. Railway      - https://railway.app (Free tier)
#   4. Local PC     - PostgreSQL install kara
# ===================================

spring.datasource.url=jdbc:postgresql://localhost:5432/indianstars_db
spring.datasource.username=YOUR_DB_USERNAME
spring.datasource.password=YOUR_DB_PASSWORD
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate Settings
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# App Name
spring.application.name=IndianStarsAPI

# ===================================
# Neon.tech (FREE Cloud PostgreSQL) use karnyasathi:
# spring.datasource.url=jdbc:postgresql://ep-xxxx.neon.tech/indianstars_db?sslmode=require
# spring.datasource.username=neondb_owner
# spring.datasource.password=YOUR_NEON_PASSWORD
# ===================================
